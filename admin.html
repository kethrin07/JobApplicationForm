<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applications — Admin</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <!-- Login view: shown when nobody is signed in -->
  <div class="card" id="loginView" style="max-width: 420px;">
    <div class="card-header">
      <h1>Admin Login</h1>
      <p>Sign in to view submitted applications.</p>
    </div>
    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required />
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required />
      </div>
      <button type="submit" id="loginBtn">Sign In</button>
      <div class="success" id="loginError"></div>
    </form>
  </div>

  <p class="page-link" id="backLink">&larr; <a href="index.html">Back to application form</a></p>

  <!-- Dashboard view: shown once signed in -->
  <div class="dashboard" id="dashboardView" hidden>
    <div class="dashboard-bar">
      <div>
        <h1>Applications</h1>
        <p id="countLabel">Loading…</p>
      </div>
      <button class="secondary" id="signOutBtn">Sign Out</button>
    </div>

    <div class="table-wrap">
      <table id="appsTable">
        <thead>
          <tr>
            <th>Submitted</th>
            <th>Name</th>
            <th>Contact</th>
            <th>Position</th>
            <th>Experience</th>
            <th>Cover Letter</th>
            <th>Resume</th>
          </tr>
        </thead>
        <tbody id="appsBody"></tbody>
      </table>
      <p class="empty" id="emptyState" hidden>No applications yet.</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
