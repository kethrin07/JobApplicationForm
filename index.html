<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Form</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Job Application</h1>
      <p>Fill out the form below to apply. Fields marked <span aria-hidden="true">*</span> are required.</p>
    </div>

    <form id="applicationForm" novalidate>
      <div class="field">
        <label for="name">Full Name <span class="req">*</span></label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required />
      </div>

      <div class="field row">
        <div>
          <label for="email">Email <span class="req">*</span></label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required />
        </div>
        <div>
          <label for="phone">Phone <span class="req">*</span></label>
          <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required />
        </div>
      </div>

      <div class="field row">
        <div>
          <label for="position">Position <span class="req">*</span></label>
          <select id="position" name="position" required>
            <option value="" disabled selected>Select a role</option>
            <option>Software Engineer</option>
            <option>Product Manager</option>
            <option>Designer</option>
            <option>Data Analyst</option>
            <option>Marketing Specialist</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label for="experience">Experience <span class="req">*</span></label>
          <select id="experience" name="experience" required>
            <option value="" disabled selected>Years of experience</option>
            <option>Less than 1 year</option>
            <option>1–3 years</option>
            <option>3–5 years</option>
            <option>5–10 years</option>
            <option>10+ years</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="resume">Resume Upload <span class="req">*</span></label>
        <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx,image/*" required />
        <p class="hint">Accepted formats: PDF, DOC, DOCX, or an image (JPG, PNG, etc.)</p>
      </div>

      <div class="field">
        <label for="cover">Cover Letter</label>
        <textarea id="cover" name="cover" placeholder="Tell us why you're a great fit for this role..."></textarea>
      </div>

      <button type="submit" id="submitBtn">Submit Application</button>

      <div class="success" id="success"></div>
    </form>
  </div>

  <p class="page-link">Admin? <a href="admin.html">Sign in here</a></p>

  <!-- config.js holds your Supabase keys (gitignored); app.js contains the form logic. -->
  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
